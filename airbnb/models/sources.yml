sources:
  - name: airbnb
    schema: raw
    description: >
      Raw data ingested directly from the Airbnb platform into the data
      warehouse. These tables represent unprocessed operational data and serve
      as the single source of truth for all downstream transformations. No
      business logic is applied at this layer — data quality rules and
      cleansing happen in the dim_ models.
    tables:

      - name: listings
        identifier: raw_listings
        description: >
          Raw Airbnb property listings as ingested from the platform. Each row
          represents one listing and contains all property details as submitted
          by the host, before any cleansing or transformation. This is the
          authoritative source for listing inventory and drives the
          dim_listings_cleansed model.
        columns:
          - name: id
            description: >
              Unique identifier for the listing, assigned by Airbnb. Renamed
              to listing_id in downstream models.

          - name: name
            description: >
              The display title of the listing as shown to guests searching on
              the Airbnb platform. Renamed to listing_name downstream.

          - name: listing_url
            description: >
              The public URL guests can use to view and book this listing on
              Airbnb.

          - name: room_type
            description: >
              The category of accommodation offered. Determines how the listing
              appears in Airbnb's search filters. Expected to have exactly 4
              distinct values: 'Entire home/apt', 'Private room', 'Shared room',
              'Hotel room'.
            tests:
              - dbt_expectations.expect_column_distinct_count_to_equal:
                  arguments:
                    value: 4

          - name: minimum_nights
            description: >
              The minimum number of consecutive nights a guest must book, as
              set by the host. Values of 0 may appear in the raw data and are
              corrected to 1 in the cleansed model.
            tests:
              - dbt_expectations.expect_column_values_to_be_between:
                  arguments:
                    min_value: 0
                    max_value: 1125
                  config:
                    severity: warn

          - name: host_id
            description: >
              Foreign key to the hosts table. Identifies which host owns
              this listing.

          - name: price
            description: >
              The nightly price as a raw string from the source system,
              including the currency symbol (e.g. "$120.00"). The '$' prefix
              is stripped and the value cast to numeric in dim_listings_cleansed.
            tests:
              - dbt_expectations.expect_column_values_to_match_regex:
                  arguments:
                    regex: "^\\\\$[0-9][0-9\\\\.]+$"

          - name: created_at
            description: >
              Timestamp when the listing was first created on the Airbnb
              platform.

          - name: updated_at
            description: >
              Timestamp of the most recent change to the listing's details
              in the source system.

      - name: hosts
        identifier: raw_hosts
        description: >
          Raw host profiles as ingested from the Airbnb platform. Each row
          represents one host account and contains the profile information
          hosts provide when they register. This table drives the
          dim_hosts_cleansed model and is the authoritative source for all
          host attributes.
        columns:
          - name: id
            description: >
              Unique identifier for the host, assigned by Airbnb. Renamed to
              host_id in downstream models.

          - name: name
            description: >
              The host's display name as shown to guests on the platform. May
              be null for some accounts — null values are replaced with
              'Anonymous' in dim_hosts_cleansed.
            config:
              meta:
                pii: true
                pii_type: name

          - name: is_superhost
            description: >
              Flag indicating whether Airbnb has granted the host "Superhost"
              status based on performance metrics such as response rate, guest
              ratings, and total number of completed stays. Raw values are
              't' (Superhost) or 'f' (standard host).
            tests:
              - dbt_expectations.expect_column_distinct_count_to_equal:
                  arguments:
                    value: 2

          - name: created_at
            description: >
              Timestamp when the host account was first created on the Airbnb
              platform.

          - name: updated_at
            description: >
              Timestamp of the most recent update to the host's profile
              in the source system.

      - name: reviews
        identifier: raw_reviews
        description: >
          Raw guest reviews as ingested from the Airbnb platform. Each row is
          a single review left by a guest after completing a stay. Reviews are
          a critical signal for guest satisfaction and listing quality. Only
          reviews with non-null written text flow through to fct_reviews.
          Freshness is monitored to ensure review data is current.
        config:
          loaded_at_field: date
          freshness:
            warn_after: {count: 1, period: hour}
            error_after: {count: 24, period: hour}
        columns:
          - name: listing_id
            description: >
              Foreign key to the listings table. Identifies which listing
              this review was written for.

          - name: date
            description: >
              The date the guest submitted their review. Renamed to
              review_date in downstream models. Also used as the
              loaded_at_field for freshness monitoring.
            tests:
              - dbt_expectations.expect_column_values_to_be_between:
                  arguments:
                    min_value: "'2008-01-01'::date"
                    max_value: "current_date"

          - name: reviewer_name
            description: >
              The name of the guest who left the review, as it appears on their
              Airbnb profile.
            config:
              meta:
                pii: true
                pii_type: name

          - name: comments
            description: >
              The full text of the guest's written review. Renamed to
              review_text in downstream models. Rows where this field is null
              are excluded from fct_reviews.
            config:
              meta:
                pii: true
                pii_type: free_text

          - name: sentiment
            description: >
              Pre-computed sentiment classification of the review text, derived
              before loading into the warehouse. Renamed to review_sentiment
              downstream. Values: 'positive', 'neutral', 'negative'.
            tests:
              - dbt_expectations.expect_column_distinct_count_to_equal:
                  arguments:
                    value: 3
