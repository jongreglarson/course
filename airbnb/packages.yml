packages:
  # Utility macros used across the project:
  #   - generate_surrogate_key: MD5 surrogate key used in fct_reviews
  #   - Additional helpers available for cross-database SQL compatibility
  - package: dbt-labs/dbt_utils
    version: 1.3.3

  # Extended data quality tests beyond dbt's built-in generic tests:
  #   - expect_column_values_to_be_between: numeric range checks on price, minimum_nights
  #   - expect_column_quantile_values_to_be_between: price distribution guard on dim_listings_w_hosts
  #   - expect_column_max_to_be_between: price ceiling with warn severity
  #   - expect_column_values_to_match_regex: raw price string format, listing URL format
  #   - expect_column_distinct_count_to_equal: cardinality guards on categorical columns
  #   - expect_column_value_lengths_to_be_between: minimum content length on review_text
  #   - expect_table_row_count_to_equal_other_table: row count parity across model layers
  - package: metaplane/dbt_expectations
    version: 0.10.10
