# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'airbnb'
version: '1.0.0'

# This setting configures which "profile" dbt uses for this project.
profile: 'airbnb'

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
asset-paths: ["assets"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"


# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models

# In this example config, we tell dbt to build all models in the example/
# directory as views. These settings can be overridden in the individual model
# files using the `{{ config(...) }}` macro.
# Ensures the audit log table exists before any model runs. The post-hook
# on every model inserts a record here, giving a lightweight run history
# queryable at: SELECT * FROM <schema>.audit_log ORDER BY run_timestamp DESC
on-run-start:
  - "CREATE TABLE IF NOT EXISTS {{ target.schema }}.audit_log ( model_name STRING, run_timestamp TIMESTAMP )"

models:
  airbnb:
    +tags: ['airbnb', 'daily']
    # TRANSFORM role builds models; reporter role gets read-only select for BI tools
    +grants:
      select: ["transform", "reporter"]
    # Records every model build in the audit log for lineage and debugging
    +post-hook:
      - "INSERT INTO {{ target.schema }}.audit_log VALUES ('{{ this }}', CURRENT_TIMESTAMP)"
    +materialized: view
    src:
      # Ephemeral — no physical table created; inlined as CTEs into downstream models
      +materialized: ephemeral
      +tags: ['staging']
    dim:
      +materialized: table
      +tags: ['dimensions']
    fct:
      +materialized: table
      +tags: ['facts']
    mart:
      +materialized: table
      +tags: ['marts']

vars:
  user_name: default_user_name_for_project

data_tests:
  +store_failures: true
  +schema: test_results

flags:
  require_generic_test_arguments_property: true

