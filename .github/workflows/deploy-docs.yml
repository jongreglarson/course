name: Deploy dbt Docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "airbnb/docs/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site
        run: |
          mkdir -p _site/original _site/upscaled/assets

          cp airbnb/docs/index.html    _site/original/
          cp airbnb/docs/manifest.json _site/original/
          cp airbnb/docs/catalog.json  _site/original/

          cp airbnb/docs/upscaled/index.html    _site/upscaled/
          cp airbnb/docs/upscaled/manifest.json _site/upscaled/
          cp airbnb/docs/upscaled/catalog.json  _site/upscaled/
          cp airbnb/docs/upscaled/sources.json  _site/upscaled/
          cp -r airbnb/docs/upscaled/assets/    _site/upscaled/assets/

          touch _site/.nojekyll

          cat > _site/index.html << 'LANDING'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Airbnb dbt Project — Documentation</title>
            <style>
              *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
              body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                background: #0f1117;
                color: #e2e8f0;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 2rem;
              }
              .container { max-width: 720px; width: 100%; text-align: center; }
              .badge {
                display: inline-block;
                background: #1e293b;
                border: 1px solid #334155;
                border-radius: 9999px;
                padding: 0.25rem 0.75rem;
                font-size: 0.75rem;
                color: #94a3b8;
                letter-spacing: 0.05em;
                text-transform: uppercase;
                margin-bottom: 1.5rem;
              }
              h1 { font-size: 2.25rem; font-weight: 700; line-height: 1.2; margin-bottom: 0.75rem; }
              h1 span { color: #38bdf8; }
              .subtitle { color: #94a3b8; font-size: 1rem; line-height: 1.6; margin-bottom: 3rem; max-width: 480px; margin-left: auto; margin-right: auto; }
              .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 3rem; }
              @media (max-width: 520px) { .cards { grid-template-columns: 1fr; } }
              .card {
                background: #1e293b;
                border: 1px solid #334155;
                border-radius: 12px;
                padding: 2rem 1.5rem;
                text-decoration: none;
                color: inherit;
                transition: border-color 0.2s, transform 0.2s;
                display: block;
              }
              .card:hover { border-color: #38bdf8; transform: translateY(-2px); }
              .card-icon { font-size: 2rem; margin-bottom: 0.75rem; }
              .card h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; }
              .card p { font-size: 0.875rem; color: #94a3b8; line-height: 1.5; }
              .card .tag {
                display: inline-block;
                margin-top: 1rem;
                font-size: 0.7rem;
                font-weight: 600;
                letter-spacing: 0.05em;
                text-transform: uppercase;
                padding: 0.2rem 0.6rem;
                border-radius: 4px;
              }
              .tag-course { background: #1e3a5f; color: #7dd3fc; }
              .tag-ai { background: #1a2e1a; color: #86efac; }
              .stack {
                display: flex;
                flex-wrap: wrap;
                gap: 0.5rem;
                justify-content: center;
                margin-bottom: 2rem;
              }
              .chip {
                background: #1e293b;
                border: 1px solid #334155;
                border-radius: 6px;
                padding: 0.3rem 0.7rem;
                font-size: 0.75rem;
                color: #94a3b8;
              }
              footer { font-size: 0.75rem; color: #475569; }
            </style>
          </head>
          <body>
            <div class="container">
              <div class="badge">Data Engineering Portfolio</div>
              <h1>Airbnb <span>dbt</span> Project</h1>
              <p class="subtitle">
                A Snowflake + dbt pipeline transforming raw Airbnb data into a tested,
                documented analytics layer — built from a Udemy course, then upscaled with AI.
              </p>

              <div class="cards">
                <a class="card" href="original/">
                  <div class="card-icon">📚</div>
                  <h2>Original Project</h2>
                  <p>Course-baseline pipeline covering staging, core, and mart layers with standard dbt patterns.</p>
                  <span class="tag tag-course">Udemy Course</span>
                </a>
                <a class="card" href="upscaled/">
                  <div class="card-icon">🚀</div>
                  <h2>Upscaled Project</h2>
                  <p>AI-enhanced version with full documentation, expanded testing, orchestration, and downstream delivery.</p>
                  <span class="tag tag-ai">AI Enhanced</span>
                </a>
              </div>

              <div class="stack">
                <span class="chip">Snowflake</span>
                <span class="chip">dbt</span>
                <span class="chip">Dagster</span>
                <span class="chip">GitHub Actions</span>
                <span class="chip">Google Sheets</span>
                <span class="chip">Tableau Public</span>
              </div>

              <footer>Built by Jon Larson &nbsp;·&nbsp; <a href="https://github.com/jongreglarson/course" style="color:#38bdf8;text-decoration:none;">GitHub</a></footer>
            </div>
          </body>
          </html>
          LANDING

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
