name: Dagster+ Deploy

on:
  push:
    branches:
      - main
    paths:
      - "airbnb/**"
      - "!airbnb/docs/**"
      - "!airbnb/edr_target/**"
      - "!airbnb/*.log"
      - "!airbnb/*.sql"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Dagster+ Serverless
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dagster-cloud CLI
        run: pip install dagster-cloud

      - name: Deploy to Dagster+ Serverless
        run: |
          dagster-cloud serverless deploy \
            --location-name airbnb_dbt \
            --working-directory airbnb \
            --module-name airbnb_project.definitions \
            --deployment prod
        env:
          DAGSTER_CLOUD_API_TOKEN: ${{ secrets.DAGSTER_CLOUD_API_TOKEN }}
          DAGSTER_CLOUD_ORGANIZATION: ${{ secrets.DAGSTER_CLOUD_ORGANIZATION_ID }}
